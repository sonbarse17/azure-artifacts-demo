name: Simple Python Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Configure pip (Azure Artifacts only)
        if: ${{ secrets.AZURE_ARTIFACTS_PYPI_URL != '' && secrets.AZURE_ARTIFACTS_PAT != '' }}
        env:
          FEED_URL: ${{ secrets.AZURE_ARTIFACTS_PYPI_URL }}
          FEED_PAT: ${{ secrets.AZURE_ARTIFACTS_PAT }}
        run: |
          mkdir -p ~/.config/pip
          python - <<'PY'
          import os
          from urllib.parse import urlparse

          feed_url = os.environ["FEED_URL"].strip()
          pat = os.environ["FEED_PAT"].strip()
          p = urlparse(feed_url)
          auth_url = f"{p.scheme}://__token__:{pat}@{p.netloc}{p.path}"

          with open(os.path.expanduser("~/.config/pip/pip.conf"), "w", encoding="utf-8") as f:
              f.write("[global]\n")
              f.write(f"index-url = {auth_url}\n")
          PY

      - name: Install dependencies (optional)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Build package
        run: python -m build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Azure Artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        env:
          TWINE_REPOSITORY_URL: ${{ secrets.AZURE_ARTIFACTS_PUBLISH_URL }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.AZURE_ARTIFACTS_PAT }}
        run: twine upload --skip-existing dist/*
